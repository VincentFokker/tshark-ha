name: "tshark Network Analyzer"
version: "1.0.0"
slug: "tshark_ha"
description: "Live packet capture and network traffic visualization using tshark"
url: "https://github.com/VincentFokker/tshark-ha"
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: manual
host_network: true
privileged:
  - NET_ADMIN
  - NET_RAW
  - SYS_ADMIN
ingress: true
ingress_port: 8099
panel_icon: mdi:ethernet
panel_title: "Network Analyzer"
options:
  interface: "any"
  capture_filter: ""
  display_filter: ""
  max_packets: 10000
  snaplen: 65535
  rotate_seconds: 0
schema:
  interface: str
  capture_filter: str
  display_filter: str
  max_packets: int(100,100000)
  snaplen: int(64,65535)
  rotate_seconds: int(0,86400)
